services:
  mysql:
    image: mysql:8.4
    container_name: aicodereview-mysql
    environment:
      MYSQL_DATABASE: aicodereview
      MYSQL_USER: aicodereview
      MYSQL_PASSWORD: aicodereview
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_0900_ai_ci
    volumes:
      - aicodereview_mysql_data:/var/lib/mysql

volumes:
  aicodereview_mysql_data:

